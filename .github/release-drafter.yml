name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '📝 Documentation'
    labels: ['documentation', 'docs']
  - title: '⬆️ Dependencies'
    labels: ['dependencies']
  - title: '🏗️ Maintenance'
    labels: ['chore', 'ci', 'refactor']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'documentation', 'docs', 'dependencies', 'chore', 'ci', 'refactor']
  default: patch
template: |
  ## What's Changed

  $CHANGES

  ## Install

  ```bash
  bunx @insurup/cli@$RESOLVED_VERSION --help          # npm (requires Bun)
  brew install InsurUp/insurup/cli                # Homebrew
  ```

  Standalone binaries for macOS/Linux/Windows are attached below.

  ## Contributors

  $CONTRIBUTORS
